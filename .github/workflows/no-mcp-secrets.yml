name: No MCP secret files

# Reject any push/PR that commits a local MCP config — these files routinely hold
# API tokens (.mcp.json, .cursor/mcp.json, .junie/mcp/mcp.json, .vscode/mcp.json, …).
# Pairs with the gitignore. Add as a required status check to block merges.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  block-mcp-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject mcp.json configs
        run: |
          matches=$(git ls-files | grep -E '(^|/)\.?mcp\.json$' || true)
          if [ -n "$matches" ]; then
            echo "::error::Committed MCP config file(s) detected — they can contain API tokens. Remove + gitignore them:"
            echo "$matches"
            exit 1
          fi
          echo "OK — no MCP config files tracked."
